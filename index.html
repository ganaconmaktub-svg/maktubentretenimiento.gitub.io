<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MAKTUB</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  overflow:hidden;
  height:100vh;
}

.video-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.55);
  z-index:-1;
}

.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

h1{
  color:#fff;
  font-size:70px;
  font-weight:900;
  letter-spacing:4px;
  margin-bottom:30px;
  text-shadow:
  0 0 10px rgba(255,255,255,.6),
  0 0 20px rgba(255,255,255,.4);
}

.btn-whatsapp{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  width:90%;
  max-width:420px;
  padding:22px;
  border-radius:18px;
  text-decoration:none;
  background:#25D366;
  color:#fff;
  font-size:28px;
  font-weight:bold;
  box-shadow:
  0 0 20px rgba(37,211,102,.7);
  transition:0.3s;
}

.btn-whatsapp:hover{
  transform:scale(1.05);
}

.icon{
  font-size:35px;
}

@media(max-width:768px){

  h1{
    font-size:50px;
  }

  .btn-whatsapp{
    font-size:22px;
    padding:20px;
  }
}
</style>
</head>

<body>

<!-- VIDEO DE FONDO -->
<video autoplay muted loop playsinline class="video-bg">
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

  <h1>MAKTUB</h1>

  <a
    class="btn-whatsapp"
    href="https://wa.me/5491165710691?text=Hola%20quiero%20info%20de%20los%20beneficios"
    target="_blank"
  >
    <span class="icon">💬</span>
    WHATSAPP
  </a>

</div>

</body>
</html>
