<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maktub Online</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background-image:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1920&auto=format&fit=crop');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
overflow:hidden;
}

.overlay{
width:100%;
min-height:100vh;
background:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85));
display:flex;
justify-content:center;
align-items:center;
padding:20px;
backdrop-filter:blur(3px);
}

.container{
max-width:1000px;
animation:fade 1.2s ease;
}

.logo{
font-size:90px;
font-weight:bold;
color:#f5c542;
text-shadow:
0 0 10px #ffcc00,
0 0 20px #ffcc00,
0 0 40px #ff9900;
margin-bottom:20px;
}

.subtitle{
font-size:32px;
margin-bottom:45px;
font-weight:bold;
color:white;
text-shadow:0 0 15px black;
}

.boxes{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-bottom:50px;
}

.box{
background:rgba(0,0,0,0.6);
border:2px solid #f5c542;
padding:30px;
border-radius:25px;
width:240px;
box-shadow:0 0 25px rgba(255,204,0,0.4);
transition:0.3s;
}

.box:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 35px rgba(255,204,0,0.8);
}

.box h3{
color:#f5c542;
font-size:28px;
margin-bottom:15px;
}

.box p{
font-size:18px;
line-height:1.5;
}

.whatsapp{
display:inline-block;
margin-top:20px;
background:#25D366;
color:white;
padding:22px 50px;
font-size:34px;
font-weight:bold;
text-decoration:none;
border-radius:20px;
animation:pulse 1.5s infinite;
box-shadow:0 0 35px rgba(37,211,102,0.9);
transition:0.3s;
}

.whatsapp:hover{
transform:scale(1.08);
background:#1ebe5d;
}

.frase{
margin-top:35px;
font-size:42px;
font-weight:bold;
color:#f5c542;
text-shadow:
0 0 10px #ffcc00,
0 0 20px #ff9900;
animation:brillo 2s infinite alternate;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.06);
}

100%{
transform:scale(1);
}

}

@keyframes brillo{

0%{
opacity:0.7;
}

100%{
opacity:1;
}

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:768px){

.logo{
font-size:55px;
}

.subtitle{
font-size:24px;
}

.whatsapp{
font-size:24px;
padding:18px 30px;
}

.frase{
font-size:28px;
}

}

</style>

</head>

<body>

<div class="overlay">

<div class="container">

<div class="logo">
MAKTUB ONLINE
</div>

<div class="subtitle">
🔥 PLATAFORMA DE ENTRETENIMIENTO 🔥
</div>

<div class="boxes">

<div class="box">
<h3>🎁 BONOS</h3>
<p>Promociones exclusivas para nuevos usuarios.</p>
</div>

<div class="box">
<h3>⚡ RÁPIDO</h3>
<p>Acceso inmediato y retiros seguros.</p>
</div>

<div class="box">
<h3>💎 VIP</h3>
<p>Atención personalizada las 24 horas.</p>
</div>

</div>

<a class="whatsapp" href="https://wa.me/5491165710691" target="_blank">
📲 WHATSAPP
</a>

</div>

</div>

</body>
</html>
