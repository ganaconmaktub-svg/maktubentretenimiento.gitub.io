<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oferta Especial</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
text-align:center;
}

.hero{
padding:40px 20px;
}

.hero img{
width:100%;
max-width:500px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
margin-bottom:30px;
}

h1{
font-size:42px;
margin-bottom:20px;
color:#00ff88;
}

p{
font-size:22px;
max-width:700px;
margin:auto;
margin-bottom:30px;
line-height:1.5;
}

.btn{
display:inline-block;
background:#25D366;
padding:18px 35px;
color:white;
text-decoration:none;
font-size:24px;
font-weight:bold;
border-radius:15px;
animation:pulse 1.5s infinite;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
background:#1ebe5d;
}

@keyframes pulse{
0%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(37,211,102,0.7);
}

70%{
transform:scale(1.05);
box-shadow:0 0 0 20px rgba(37,211,102,0);
}

100%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(37,211,102,0);
}
}

footer{
margin-top:50px;
padding:20px;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<section class="hero">

<img src="Plantaforma online.jpg" alt="Producto">

</p>

<a class="btn"
href="https://wa.me/5491165710691">
📲 HABLAR POR WHATSAPP
</a>

</section>

<footer>
© 2026 - Todos los derechos reservados
</footer>

</body>
</html>
