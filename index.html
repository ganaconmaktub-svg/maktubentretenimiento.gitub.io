<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maktub Entretenimiento</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background-image:url('fondo.jpg');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:scroll;
color:white;
text-align:center;
}

.hero{
padding:40px 20px;
min-height:100vh;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(2px);
}

.hero img{
width:100%;
max-width:500px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
margin-bottom:30px;
}

h1{
font-size:42px;
margin-bottom:20px;
color:#00ff88;
}

p{
font-size:22px;
max-width:700px;
margin:auto;
margin-bottom:30px;
line-height:1.5;
}

.btn{
display:inline-block;
background:#25D366;
padding:18px 35px;
color:white;
text-decoration:none;
font-size:24px;
font-weight:bold;
border-radius:15px;
animation:pulse 1.5s infinite;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
background:#1ebe5d;
}

@keyframes pulse{

0%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(37,211,102,0.7);
}

70%{
transform:scale(1.05);
box-shadow:0 0 0 20px rgba(37,211,102,0);
}

100%{
transform:scale(1);
box-shadow:0 0 0 0 rgba(37,211,102,0);
}

}

footer{
padding:20px;
font-size:14px;
opacity:0.7;
background:rgba(0,0,0,0.6);
}

</style>

</head>

<body>

<section class="hero">

<img src="logo.png" alt="Maktub">

<h1>MAKTUB ENTRETENIMIENTO</h1>

<p>
Tu texto original acá.
</p>

<a class="btn" href="https://wa.me/5490000000000">
CONTACTAR POR WHATSAPP
</a>

</section>

<footer>
© 2026 Maktub Entretenimiento
</footer>

</body>
</html>
